<!-- Start Asset @NewGuid.1@ -->
<!-- Script : @ScriptData@ -->
<div class="w3-panel" data-id="@NewGuid.1@" id="asset-@NewGuid.1@">
    <div class="w3-card" style="padding-bottom:20px;">
        <header class="w3-@Colour@ w3-container"><h5>@LinkTitle@ - @AlternateDate@<!-- remove start --><a class="w3-right" href="remove:@NewGuid.1@"><i class="w3-right fa fa-close w3-text-red"></i></a><!-- remove end --></h5></header>
        <span class="w3-hide e24-scriptinfo">@ScriptInfo@</span>
        <div class="w3-quarter @hideComments@">
            <h5 class="w3-container"><b>Comments</b></h5>
            <div class="w3-container e24Hideable">
                <div style="white-space: pre-wrap;"><small>@Comments@</small></div>
            </div>
        </div>
        <div class="w3-rest w3-container" style="padding:0.01cm">
            @Objects.Field@
        </div>
        <div class="w3-container">
            <div class="w3-quarter @hideComments@">
                &nbsp;
            </div>
            <div class="w3-rest w3-container" style="padding:0.01cm">
                <div class="w3-half">
                    <input class="e24-radio w3-radio" type="radio" id="@NewGuid.2@" name="@NewGuid.1@" />
                    <label for="@NewGuid.2@">Disagree</label>
                </div>
                <div class="w3-half">
                    <input class="e24-radio w3-radio" type="radio" id="@NewGuid.3@" name="@NewGuid.1@" />
                    <label for="@NewGuid.3@">Agree</label>
                </div>
            </div>
        </div>
        @Comment@
    </div>
</div>
<!-- End Asset @NewGuid.1@ -->
