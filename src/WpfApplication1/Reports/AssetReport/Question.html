<div class="w3-container hh-asset" id="@Type@-@ID@">
    <div class="w3-row">
        <b>Question ID:</b> @ID@
    </div>
    <div class="w3-row">
        <table class="w3-table w3-table-all">
            <tr class="w3-border">
                <td class="w3-container w3-border" style="width:16.666%">
                    ExpertStatement
                </td>
                <td class="w3-border" style="padding:0">
                    <table style="width:100%">
                        <tr style="background-color:transparent">
                            <td class="hh-asset-content w3-container" style="width:50%">@ExpertStatement@</td>
                            <td class="hh-asset-content w3-container w3-border-left" style="width:50%">@ExpertStatement_Language@</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr class="w3-border">
                <td class="w3-container w3-border" style="width:16.666%">
                    LayStatement
                </td>
                <td class="w3-border" style="padding:0">
                    <table style="width:100%">
                        <tr style="background-color:transparent">
                            <td class="hh-asset-content w3-container" style="width:50%">@LayStatement@</td>
                            <td class="hh-asset-content w3-container w3-border-left" style="width:50%">@LayStatement_Language@</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr class="w3-border">
                <td class="w3-container w3-border" style="width:16.666%">
                    Question
                </td>
                <td class="w3-border" style="padding:0">
                    <table style="width:100%">
                        <tr style="background-color:transparent">
                            <td class="hh-asset-content w3-container" style="width:50%">@Question@</td>
                            <td class="hh-asset-content w3-container w3-border-left" style="width:50%">@Question_Language@</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr class="w3-border">
                <td class="w3-container w3-border" style="width:16.666%">
                    Explanation
                </td>
                <td class="w3-border" style="padding:0">
                    <table style="width:100%">
                        <tr style="background-color:transparent">
                            <td class="hh-asset-content w3-container" style="width:50%">@Explanation@</td>
                            <td class="hh-asset-content w3-container w3-border-left" style="width:50%">@Explanation_Language@</td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </div>
    @AgreeDisagree@
    <div class="w3-container">
        <div class="e24-comment" id="@NewGuid@"></div>
    </div>
    <br />
</div>
