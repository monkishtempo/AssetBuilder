<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width" />
    <title>@Title@</title>
    <meta http-equiv='Content-Type' content='text/html;charset=UTF-8'>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.min.css">
    <style type="text/css">
        .highlight {
            background-color: red;
            color: white;
        }

        .e24subtext {
            font-size: smaller;
            font-style: italic;
        }

        .hh-asset-content {
            white-space: pre-wrap;
        }
    </style>
    <script type="text/javascript" src="https://apps.expert-24.com/Reports/w3codecolor.js"></script>
    <script type="text/javascript">var PageID = '@PageID@';</script>
    <script type="text/javascript">
        function highlight_all(o) {
            var col = o.getAttribute('spanid');
            var l = document.getElementsByTagName('span');
            for (var i = 0; i < l.length; i++) {
                if (l[i].getAttribute('spanid') == col) {
                    l[i].setAttribute('oldcolor', l[i].style.color);
                    l[i].removeAttribute('style');
                    l[i].className = 'highlight';
                }
            }
        }

        function unhighlight_all(o) {
            var l = document.getElementsByTagName('span');
            for (var i = 0; i < l.length; i++) {
                if (l[i].className == 'highlight') {
                    l[i].className = '';
                    l[i].style.color = l[i].getAttribute('oldcolor');
                }
            }
        }

        function HH_IDs(ids) {
            for (let i in ids) if (Object.hasOwnProperty.call(ids, i)) {
                var p = document.getElementById(i + "s_IDs");
                if (p !== null) {
                    if (ids[i].length > 0) p.innerHTML = i.toLowerCase() + ":" + ids[i].join(",");
                    else p.innerHTML = "";
                }
            }
        }

        function HH_Show(v) {
            var inputs = document.getElementsByTagName("input");
            var ids = { "Algo": [], "Question": [], "Answer": [], "Conclusion": [], "Bullet": [] };
            for (let i = 0; i < inputs.length; i++) {
                if (inputs[i].getAttribute("data-value") === v) {
                    var style = "";
                    var id = inputs[i].getAttribute("data-id");
                    var split = id.split('-');
                    if (!inputs[i].checked) style = "none";
                    else ids[split[0]].push(split[1]);
                    document.getElementById(id).style.display = style;
                }
            }
            HH_IDs(ids);
        }

        function HH_ShowDisagree() {
            HH_Show("disagree");
        }

        function HH_ShowAgree() {
            HH_Show("agree");
        }

        function HH_ShowAll() {
            var assets = document.getElementsByClassName("hh-asset");
            var ids = { "Algo": [], "Question": [], "Answer": [], "Conclusion": [], "Bullet": [] };
            for (let i = 0; i < assets.length; i++) {
                assets[i].style.display = "";
                var split = assets[i].id.split('-');
                ids[split[0]].push(split[1]);
            }
            HH_IDs(ids);
        }

        function toggle(id) {
            var header = document.getElementById(id + '_Header');
            var body = document.getElementById(id + '_Body');
            header.style.display = header.style.display == '' ? 'none' : '';
            body.style.display = body.style.display == '' ? 'none' : '';
        }
    </script>
</head>
<body>
    <div style="float:right;" class="e24-login">Log in</div>
    @RenderBody@
    <script type="text/javascript">w3CodeColor();</script>
</body>
</html>
<script type="text/javascript" src="https://apps.expert-24.com/Comment/Script/e24Comment.js"></script>
