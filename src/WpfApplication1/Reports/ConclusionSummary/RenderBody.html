<div class="w3-container w3-light-grey">
    <h2>@Title@</h2>
    <h5>@SubTitle@</h5>
    <p>@Algo_List@</p>
</div>
<span class="w3-right">User: @User@ Date: @Now@</span>
<br />
<div class="w3-panel">
    <div class="w3-card-4">
        <div class="w3-row w3-border">
            <div class="w3-container w3-col w3-yellow" style="width:100px">
                <h2>ID</h2>
            </div>
            <div class="w3-container w3-right w3-col s3 m3 l3 w3-yellow @HideAlgos@">
                <h2>Algorithms</h2>
            </div>
            <div class="w3-container w3-right w3-col w3-yellow" style="width:150px">
                <h2>Ages</h2>
            </div>
            <div class="w3-container w3-rest w3-yellow">
                <h2>Conclusion</h2>
            </div>
        </div>
        @Table1.Conclusion@
    </div>
    <br />
    <div class="w3-card-4">
        <div class="w3-row w3-border">
            <div class="w3-container w3-green">
                <h2>Transfers out</h2>
            </div>
        </div>
        <div class="w3-row w3-border">
            <div class="w3-half w3-green">
                <div class="w3-container w3-col" style="width:100px">
                    <h2>ID</h2>
                </div>
                <div class="w3-container w3-rest">
                    <h2>Name</h2>
                </div>
            </div>
            <div class="w3-half w3-green">
                <div class="w3-container w3-col" style="width:100px">
                    <h2>ID</h2>
                </div>
                <div class="w3-container w3-rest">
                    <h2>Name</h2>
                </div>
            </div>
        </div>
        @Table2.Transfer@
    </div>
    <br />
    <div class="w3-card-4">
        <div class="w3-row w3-border">
            <div class="w3-container w3-orange">
                <h2>Transfers in</h2>
            </div>
        </div>
        <div class="w3-row w3-border">
            <div class="w3-half w3-orange">
                <div class="w3-container w3-col" style="width:100px">
                    <h2>ID</h2>
                </div>
                <div class="w3-container w3-rest">
                    <h2>Name</h2>
                </div>
            </div>
            <div class="w3-half w3-orange">
                <div class="w3-container w3-col" style="width:100px">
                    <h2>ID</h2>
                </div>
                <div class="w3-container w3-rest">
                    <h2>Name</h2>
                </div>
            </div>
        </div>
        @Table3.Transfer@
    </div>
</div>
