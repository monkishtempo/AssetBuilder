variables:
  APP_SERVICE_NAME: 'assetbuilder'
  REGION: 'uks'
  INSTANCE: 'cmp01'
  FULL_PREFIX: ${APP_SERVICE_NAME}${REGION}${INSTANCE}
  DEV_PREFIX: 'd${FULL_PREFIX}'
  PROD_PREFIX: 'p${FULL_PREFIX}'
  MAJOR_VERSION: 0
  MINOR_VERSION: 1
  NUGET_USR: "gitlab-ci-token"
  NUGET_PWD: $CI_JOB_TOKEN
  VERSION: "${MAJOR_VERSION}.${MINOR_VERSION}.${CI_PIPELINE_IID}"
  CS_ANALYZER_IMAGE: registry.gitlab.com/security-products/container-scanning:4
  EXE_RELEASE_FOLDER: 'src\WpfApplication1\bin\Release'
  #MSI_RELEASE_FOLDER: 'Setup\bin\Release'
  #TEST_FOLDER: 'Tests\bin\Release'
  #DEPLOY_FOLDER: 'P:\Projects\YourApp\Builds'
  NUGET_PATH: 'C:\NuGet\nuget.exe'
  MSBUILD_PATH: 'C:\Program Files (x86)\MSBuild\14.0\Bin\msbuild.exe'
  #NUNIT_PATH: 'C:\Program Files (x86)\NUnit.org\nunit-console\nunit3-console.exe'

stages:
  - build

build_job:
  stage: build
  #only:
  #  - tags  # the build process will only be started by git tag commits
  script:
    - '& "$env:NUGET_PATH" restore'  # restore Nuget dependencies
    - '& "$env:MSBUILD_PATH" "src\WpfApplication1\Asset Builder.csproj" /p:Configuration=Release'  # build the project
  artifacts:
    expire_in: 2 days  # save gitlab server space, we copy the files we need to deploy folder later on
    paths:
      - '$env:EXE_RELEASE_FOLDER\YourApp.exe'  # saving exe to copy to deploy folder
      #- '$env:MSI_RELEASE_FOLDER\YourApp Setup.msi'  # saving msi to copy to deploy folder
      #- '$env:TEST_FOLDER\'  # saving entire Test project so NUnit can run tests
